# GitHub auto-generated release notes config.
# Buckets PRs by label into release sections.
# https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - ignore-for-release

  categories:
    - title: Security
      labels:
        - security

    - title: Features
      labels:
        - enhancement
        - feature

    - title: Fixes
      labels:
        - bug
        - fix

    - title: Documentation
      labels:
        - documentation
        - docs

    - title: CI & Chore
      labels:
        - ci
        - chore
        - dependencies

    - title: Other Changes
      labels:
        - "*"

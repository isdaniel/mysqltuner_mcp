[pytest]
asyncio_mode = auto
testpaths = tests
norecursedirs = tests/integration .venv
python_files = test_*.py
python_functions = test_*
python_classes = Test*
addopts = -v --tb=short
markers =
    integration: integration test that requires Docker and a real MySQL container
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
